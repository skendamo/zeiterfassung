<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeiterfassung</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2d5c">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Titel -->

    <div class="header">

        <h1>Zeiterfassung</h1>

        <p>Einfach. Schnell. Übersichtlich.</p>

    </div>


    <!-- Mitarbeiter -->

    <div class="card">

        <label>Mitarbeiter</label>

        <input
            id="name"
            type="text"
            placeholder="Name eingeben">

    </div>


    <!-- Datum / Uhr -->

    <div class="card zeitkarte">

        <div class="datumBox">

            <div class="titel">

                Datum

            </div>

            <div id="datum"></div>

            <small>Europe/Zurich</small>

        </div>

        <div class="trennlinie"></div>

        <div class="uhrBox">

            <div class="titel">

                Uhrzeit

            </div>

            <div id="uhr"></div>

        </div>

    </div>


    <!-- Buttons -->

    <div class="buttons">

        <button
            id="btnKommen"
            class="kommen"
            onclick="stempeln('🟢 Kommen')">

            KOMMEN

        </button>

        <button
            id="btnGehen"
            class="gehen"
            onclick="stempeln('🔴 Gehen')">

            GEHEN

        </button>

        <button
            id="btnPauseStart"
            class="pauseStart"
            onclick="stempeln('☕ Pause Start')">

            PAUSE START

        </button>

        <button
            id="btnPauseEnde"
            class="pauseEnde"
            onclick="stempeln('▶️ Pause Ende')">

            PAUSE ENDE

        </button>

    </div>


    <!-- Historie -->

    <div class="card">

        <h2>Historie</h2>

        <ul id="historie"></ul>

    </div>


    <!-- Arbeitszeit -->

    <div class="card">

        <h2>Gesamtarbeitszeit</h2>

        <div id="gesamtzeit">

            00:00

        </div>

        <div class="stunden">

            (hh:mm)

        </div>

    </div>


    <!-- Unten -->

    <div class="buttons">

        <button
            class="teilen"
            onclick="teilen()">

            Bericht teilen

        </button>

        <button
            class="neu"
            onclick="neuerTag()">

            Neuer Tag

        </button>

    </div>

</div>

<script src="script.js"></script>

<script>

if('serviceWorker' in navigator){

window.addEventListener('load',()=>{

navigator.serviceWorker.register('service-worker.js');

});

}

</script>

</body>
</html>
